<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); 
            color: white; 
            min-height: 100vh;
        }
        .header {
            text-align: center; padding: 2rem 1rem; background: rgba(0,0,0,0.3);
        }
        .logo { max-width: 300px; width: 100%; height: auto; margin-bottom: 1rem; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
        .title { font-size: 2.5rem; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); letter-spacing: 2px; }
        .gallery {
            max-width: 1400px; margin: 0 auto; padding: 2rem 1rem; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem;
        }
        .photo { 
            position: relative; border-radius: 12px; overflow: hidden; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); transition: transform 0.3s, box-shadow 0.3s;
            aspect-ratio: 1; /* Marco cuadrado perfecto */
        }
        .photo:hover { transform: scale(1.05); box-shadow: 0 16px 48px rgba(255,255,255,0.1); }
        .photo img { 
            width: 100%; height: 100%; object-fit: contain; /* CAMBIO: Se ve completa, con fondo transparente */
            background: rgba(0,0,0,0.2); /* Fondo sutil para fotos con transparencias */
        }
        .contact {
            text-align: center; padding: 3rem 1rem; background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); margin-top: 3rem;
        }
        .whatsapp { 
            display: inline-block; padding: 1rem 2rem; background: #25D366; 
            color: white; text-decoration: none; border-radius: 50px; 
            font-weight: bold; font-size: 1.2rem; transition: background 0.3s;
        }
        .whatsapp:hover { background: #128C7E; }
        @media (max-width: 768px) {
            .title { font-size: 2rem; }
            .gallery { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
        }
    </style>
</head>
<body>
